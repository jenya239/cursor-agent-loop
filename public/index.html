<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>cr</title>
  <style>
    body { margin: 0; background: #fdf6e3; color: #657b83; font: 11px/1.25 ui-monospace, monospace; }
  </style>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="embed-warn" class="embed-warn" hidden>Откройте cr во внешнем браузере — во вкладке Cursor отправка зацикливается.</div>
  <header id="bar">
    <select id="ws-filter" title="workspace"><option value="">все</option></select>
    <select id="cdp-window" title="CDP window"><option value="">окно CDP</option></select>
    <span id="agent-indicator" class="agent-indicator idle" title="Агент в активном чате Cursor">AGENT · ждёт</span>
    <span id="status">…</span>
    <button type="button" id="refresh" disabled title="Обновить">↻</button>
  </header>
  <div id="layout">
    <aside id="list"><p class="loading">…</p></aside>
    <section id="chat-col">
      <div id="agent-panel" class="agent-panel" data-phase="unknown">агент · …</div>
      <main id="chat"><p class="hint">—</p></main>
      <div id="compose" class="compose">
        <textarea id="compose-input" rows="2" placeholder="Сообщение в активный чат Cursor…" disabled autocomplete="off"></textarea>
        <button type="button" id="compose-send" disabled title="Отправить">↵</button>
      </div>
    </section>
  </div>
  <script src="/bundle.js"></script>
</body>
</html>
